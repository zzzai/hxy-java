<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>支付结果页</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <section class="hero">
        <h1>支付结果页</h1>
        <p>接口绑定：`GET /pay/order/get`，状态覆盖 成功 / 处理中 / 失败。</p>
        <div class="api-config">
          <input data-api-base placeholder="API Base，例如 http://localhost:48080/admin-api" />
          <button class="button-primary" data-api-save>保存 API Base</button>
          <button class="button-ghost" data-api-clear>清空</button>
        </div>
      </section>

      <nav class="top-nav">
        <a href="index.html">总览</a>
        <a class="active" href="pay-result.html">支付结果</a>
        <a href="order-list.html">订单列表</a>
        <a href="aftersale-apply.html">售后申请</a>
        <a href="aftersale-list.html">售后列表</a>
        <a href="aftersale-detail.html">售后详情</a>
        <a href="error.html">异常页</a>
      </nav>

      <section class="panel">
        <h2>查询支付单</h2>
        <div class="grid three">
          <label>
            支付单号 id
            <input id="payOrderId" value="8801" />
          </label>
          <label>
            同步参数 sync
            <select id="syncFlag">
              <option value="true">true</option>
              <option value="false">false</option>
            </select>
          </label>
          <div class="footer-actions" style="align-items: end">
            <button class="button-primary" id="queryBtn">查询支付结果</button>
          </div>
        </div>
        <div id="pageBanner" class="banner hidden"></div>
      </section>

      <section class="panel status-box processing" id="resultBox">
        <div class="icon">⏳</div>
        <h3 id="resultTitle">待查询</h3>
        <p class="note" id="resultDesc">输入支付单号后点击查询。</p>
        <div class="footer-actions" style="justify-content: center">
          <a class="link" id="gotoOrder" href="order-list.html">查看订单</a>
          <a class="link" id="gotoRetry" href="pay-result.html">重新查询</a>
        </div>
      </section>

      <section class="panel" id="rawPanel">
        <h2>接口返回字段（pay/order/get）</h2>
        <pre id="rawResult" class="note">{}</pre>
      </section>
    </div>

    <script src="mock-data.js"></script>
    <script src="api-client.js"></script>
    <script src="app.js"></script>
    <script>
      var api = window.ClosureP0Api;
      var common = window.ClosureP0Common;
      common.syncApiBase();

      function renderStatus(data) {
        var status = Number(data && data.status);
        var box = document.getElementById('resultBox');
        var title = document.getElementById('resultTitle');
        var desc = document.getElementById('resultDesc');
        var gotoOrder = document.getElementById('gotoOrder');

        if (status === 0) {
          box.className = 'panel status-box processing';
          box.querySelector('.icon').textContent = '⏳';
          title.textContent = '支付处理中';
          desc.textContent = '系统正在确认支付结果，请稍后刷新。';
        } else if (status === 10 || status === 20) {
          box.className = 'panel status-box success';
          box.querySelector('.icon').textContent = '✓';
          title.textContent = '支付成功';
          desc.textContent = '支付金额 ￥' + common.fen2yuan(data.price) + '，可继续查看订单。';
        } else {
          box.className = 'panel status-box fail';
          box.querySelector('.icon').textContent = '!';
          title.textContent = '支付失败';
          desc.textContent = '支付单状态=' + status + '，建议重新发起支付。';
        }

        if (data && data.merchantOrderId) {
          gotoOrder.href = 'order-list.html?orderId=' + encodeURIComponent(data.merchantOrderId);
        }
      }

      async function queryPayResult() {
        var id = document.getElementById('payOrderId').value.trim();
        var sync = document.getElementById('syncFlag').value;
        var banner = document.getElementById('pageBanner');
        var raw = document.getElementById('rawResult');

        var result = await api.request('payOrderGet', {
          method: 'GET',
          params: {
            id: id,
            sync: sync,
          },
        });

        common.withFallbackHint(result, banner, result.errorType || 'service');

        if (!result.ok) {
          return;
        }

        renderStatus(result.data || {});
        raw.textContent = JSON.stringify(result.data || {}, null, 2);
      }

      document.getElementById('queryBtn').addEventListener('click', queryPayResult);
      queryPayResult();
    </script>
  </body>
</html>
