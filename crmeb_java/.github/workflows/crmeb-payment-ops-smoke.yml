name: crmeb-payment-ops-smoke

on:
  workflow_call:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
      - develop
    paths:
      - "crmeb/shell/payment_ops_status.sh"
      - "crmeb/shell/payment_incident_bundle.sh"
      - "crmeb/shell/payment_ops_morning_bundle.sh"
      - "crmeb/shell/payment_cutover_gate.sh"
      - "crmeb/shell/payment_cutover_gate_smoke.sh"
      - "crmeb/shell/payment_refund_convergence_check.sh"
      - "crmeb/shell/payment_mock_replay.sh"
      - "crmeb/shell/payment_smoke_artifact_index.sh"
      - "crmeb/shell/payment_ops_status_smoke.sh"
      - "crmeb/shell/payment_summary_contract_smoke.sh"
      - "crmeb/shell/payment_decision_chain_smoke.sh"
      - "crmeb/shell/payment_ops_cron_smoke.sh"
      - ".github/workflows/crmeb-payment-ops-smoke.yml"
  pull_request:
    paths:
      - "crmeb/shell/payment_ops_status.sh"
      - "crmeb/shell/payment_incident_bundle.sh"
      - "crmeb/shell/payment_ops_morning_bundle.sh"
      - "crmeb/shell/payment_cutover_gate.sh"
      - "crmeb/shell/payment_cutover_gate_smoke.sh"
      - "crmeb/shell/payment_refund_convergence_check.sh"
      - "crmeb/shell/payment_mock_replay.sh"
      - "crmeb/shell/payment_smoke_artifact_index.sh"
      - "crmeb/shell/payment_ops_status_smoke.sh"
      - "crmeb/shell/payment_summary_contract_smoke.sh"
      - "crmeb/shell/payment_decision_chain_smoke.sh"
      - "crmeb/shell/payment_ops_cron_smoke.sh"
      - ".github/workflows/crmeb-payment-ops-smoke.yml"

jobs:
  payment-ops-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bash syntax check
        run: |
          set -euo pipefail
          bash -n crmeb/shell/payment_ops_status.sh
          bash -n crmeb/shell/payment_incident_bundle.sh
          bash -n crmeb/shell/payment_ops_morning_bundle.sh
          bash -n crmeb/shell/payment_cutover_gate.sh
          bash -n crmeb/shell/payment_cutover_gate_smoke.sh
          bash -n crmeb/shell/payment_refund_convergence_check.sh
          bash -n crmeb/shell/payment_mock_replay.sh
          bash -n crmeb/shell/payment_smoke_artifact_index.sh
          bash -n crmeb/shell/payment_ops_status_smoke.sh
          bash -n crmeb/shell/payment_summary_contract_smoke.sh
          bash -n crmeb/shell/payment_decision_chain_smoke.sh
          bash -n crmeb/shell/payment_ops_cron_smoke.sh

      - name: Run offline smoke suite
        run: |
          set -euo pipefail
          cd crmeb
          ./shell/payment_summary_contract_smoke.sh
          ./shell/payment_ops_status_smoke.sh
          ./shell/payment_decision_chain_smoke.sh --go-nogo-require-mapping-smoke-green 1
          ./shell/payment_cutover_gate_smoke.sh
          ./shell/payment_ops_cron_smoke.sh --no-alert
          ./shell/payment_mock_replay.sh --skip-store-mapping-audit --no-alert
          ./shell/payment_smoke_artifact_index.sh --runtime-root ./runtime --out ./runtime/payment_ops_smoke_artifact_index.md

      - name: Upload smoke runtime
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: payment-ops-smoke-runtime
          path: |
            crmeb/runtime/payment_contract_smoke
            crmeb/runtime/payment_ops_status_smoke
            crmeb/runtime/payment_decision_chain_smoke
            crmeb/runtime/payment_cutover_gate_smoke
            crmeb/runtime/payment_ops_cron_smoke
            crmeb/runtime/payment_mock_replay
            crmeb/runtime/payment_ops_smoke_artifact_index.md
