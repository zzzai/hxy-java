name: crmeb-shell-lint

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
      - develop
    paths:
      - "crmeb/shell/**"
      - "crmeb/deploy/**"
      - ".github/workflows/crmeb-shell-lint.yml"
  pull_request:
    paths:
      - "crmeb/shell/**"
      - "crmeb/deploy/**"
      - ".github/workflows/crmeb-shell-lint.yml"

jobs:
  syntax:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bash syntax check (crmeb/shell)
        run: |
          set -euo pipefail
          find crmeb/shell -type f -name "*.sh" -print0 \
            | xargs -0 -n1 bash -n

      - name: Bash syntax check (crmeb/deploy)
        run: |
          set -euo pipefail
          find crmeb/deploy -type f -name "*.sh" -print0 \
            | xargs -0 -n1 bash -n
