name: crmeb-mapping-smoke

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
      - develop
    paths:
      - "crmeb/shell/payment_store_mapping_*.sh"
      - ".github/workflows/crmeb-mapping-smoke.yml"
  pull_request:
    paths:
      - "crmeb/shell/payment_store_mapping_*.sh"
      - ".github/workflows/crmeb-mapping-smoke.yml"

jobs:
  mapping-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: crmeb_java
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=12
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install mysql client
        run: |
          sudo apt-get update
          sudo apt-get install -y mysql-client

      - name: Wait mysql ready
        run: |
          set -euo pipefail
          for i in $(seq 1 30); do
            if mysql -h127.0.0.1 -P3306 -uroot -proot -e "SELECT 1" >/dev/null 2>&1; then
              exit 0
            fi
            sleep 2
          done
          echo "mysql not ready"
          exit 1

      - name: Init minimal schema
        run: |
          set -euo pipefail
          mysql -h127.0.0.1 -P3306 -uroot -proot crmeb_java <<'SQL'
          CREATE TABLE IF NOT EXISTS eb_system_store (
            id BIGINT PRIMARY KEY,
            name VARCHAR(128) NOT NULL DEFAULT '',
            phone VARCHAR(32) NOT NULL DEFAULT '',
            is_del TINYINT NOT NULL DEFAULT 0
          );
          CREATE TABLE IF NOT EXISTS eb_system_config (
            name VARCHAR(191) PRIMARY KEY,
            title VARCHAR(255) NOT NULL DEFAULT '',
            form_id INT NOT NULL DEFAULT 0,
            value VARCHAR(255) NOT NULL DEFAULT '',
            status TINYINT NOT NULL DEFAULT 1,
            create_time DATETIME NULL,
            update_time DATETIME NULL
          );
          INSERT INTO eb_system_store(id, name, phone, is_del)
          VALUES (1, 'CI门店A', '13800000001', 0), (2, 'CI门店B', '13800000002', 0)
          ON DUPLICATE KEY UPDATE name=VALUES(name), phone=VALUES(phone), is_del=VALUES(is_del);
          SQL

      - name: Bash syntax check
        run: |
          set -euo pipefail
          bash -n crmeb/shell/payment_store_mapping_import.sh
          bash -n crmeb/shell/payment_store_mapping_audit.sh
          bash -n crmeb/shell/payment_store_mapping_pipeline_smoke.sh

      - name: Run mapping pipeline smoke
        run: |
          set -euo pipefail
          cd crmeb
          DB_HOST=127.0.0.1 DB_PORT=3306 DB_NAME=crmeb_java DB_USER=root DB_PASS=root \
            ./shell/payment_store_mapping_pipeline_smoke.sh

      - name: Upload runtime artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mapping-smoke-runtime
          path: crmeb/runtime/payment_store_mapping_smoke
