name: crmeb-k8s-render

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
      - develop
    paths:
      - "crmeb/deploy/k8s/**"
      - ".github/workflows/crmeb-k8s-render.yml"
  pull_request:
    paths:
      - "crmeb/deploy/k8s/**"
      - ".github/workflows/crmeb-k8s-render.yml"

jobs:
  render-check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "v1.30.0"

      - name: Prepare k8s secret file
        run: |
          cp crmeb/deploy/k8s/base/secret.example.yaml crmeb/deploy/k8s/base/secret.yaml

      - name: Validate overlays
        run: |
          bash crmeb/deploy/k8s/scripts/validate.sh dev
          bash crmeb/deploy/k8s/scripts/validate.sh prod

      - name: Render overlays
        run: |
          bash crmeb/deploy/k8s/scripts/render.sh dev > /tmp/dev.yaml
          bash crmeb/deploy/k8s/scripts/render.sh prod > /tmp/prod.yaml
          test -s /tmp/dev.yaml
          test -s /tmp/prod.yaml
