apiVersion: apps/v1
kind: Deployment
metadata:
  name: crmeb-front
  namespace: crmeb
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: front
          resources:
            requests:
              cpu: 200m
              memory: 384Mi
            limits:
              cpu: 800m
              memory: 768Mi
