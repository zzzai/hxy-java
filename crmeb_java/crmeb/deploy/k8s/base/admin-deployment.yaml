apiVersion: apps/v1
kind: Deployment
metadata:
  name: crmeb-admin
  namespace: crmeb
spec:
  replicas: 2
  selector:
    matchLabels:
      app: crmeb-admin
  template:
    metadata:
      labels:
        app: crmeb-admin
    spec:
      containers:
        - name: admin
          image: crmeb-admin:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 20500
              name: http
          envFrom:
            - configMapRef:
                name: crmeb-app-config
            - secretRef:
                name: crmeb-app-secret
          env:
            - name: JAVA_OPTS
              value: "-Xms256m -Xmx1024m"
          readinessProbe:
            httpGet:
              path: /api/admin/getLoginPic
              port: 20500
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /api/admin/getLoginPic
              port: 20500
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 6
          resources:
            requests:
              cpu: 300m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: image-cache
              mountPath: /data/images
      volumes:
        - name: image-cache
          emptyDir: {}
