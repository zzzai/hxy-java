apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: crmeb-ingress
  namespace: crmeb
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
spec:
  ingressClassName: nginx
  rules:
    - host: admin.crmeb.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: crmeb-admin
                port:
                  number: 80
    - host: front.crmeb.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: crmeb-front
                port:
                  number: 80
