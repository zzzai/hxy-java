apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: crmeb-admin
  namespace: crmeb
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: crmeb-admin
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
