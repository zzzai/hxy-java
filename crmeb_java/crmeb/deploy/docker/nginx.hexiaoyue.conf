# hexiaoyue.com 域名接入 CRMEB（FRP 穿透场景）
# 场景：
# - 公网机器(115.190.245.14) 运行 Nginx + frps
# - 内网开发机运行 crmeb-admin/crmeb-front + frpc
# 路径：
# api/admin 域名 -> 公网 Nginx -> 公网本机 FRP 端口 -> 内网服务
# - admin.hexiaoyue.com -> 127.0.0.1:32000 (frps 暴露，转发到内网 20500)
# - api.hexiaoyue.com   -> 127.0.0.1:32010 (frps 暴露，转发到内网 20510)

upstream crmeb_admin_upstream {
    server 127.0.0.1:32000;
    keepalive 32;
}

upstream crmeb_front_upstream {
    server 127.0.0.1:32010;
    keepalive 32;
}

server {
    listen 80;
    server_name admin.hexiaoyue.com api.hexiaoyue.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name admin.hexiaoyue.com;

    # 替换为你的证书路径
    ssl_certificate     /etc/letsencrypt/live/admin.hexiaoyue.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.hexiaoyue.com/privkey.pem;

    client_max_body_size 50m;

    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_pass http://crmeb_admin_upstream;
    }
}

server {
    listen 443 ssl http2;
    server_name api.hexiaoyue.com;

    # 替换为你的证书路径
    ssl_certificate     /etc/letsencrypt/live/api.hexiaoyue.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.hexiaoyue.com/privkey.pem;

    client_max_body_size 50m;

    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 120s;
        proxy_connect_timeout 30s;
        proxy_send_timeout 120s;
        proxy_pass http://crmeb_front_upstream;
    }
}
