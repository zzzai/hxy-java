# CRMEB 相关配置
crmeb:
  version: CRMEB-JAVA-KY-v1.4
  imagePath: /JAVA_PROJECT/OPEN/dev/admin/
  asyncConfig: false

server:
  port: 20510

spring:
  profiles:
    active: dev
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/crmeb_java?characterEncoding=utf-8&useSSL=false&serverTimeZone=GMT+8
    username: ${CRMEB_DB_USERNAME:crmeb}
    password: ${CRMEB_DB_PASSWORD:}
  redis:
    host: 127.0.0.1
    port: 6379
    password:
    timeout: 10000
    database: 6
    jedis:
      pool:
        max-active: 200
        max-wait: -1
        max-idle: 10
        min-idle: 0
        time-between-eviction-runs: -1
