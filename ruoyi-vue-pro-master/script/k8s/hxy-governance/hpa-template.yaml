apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: hxy-service-hpa
  namespace: hxy-prod-core
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: hxy-service
  minReplicas: 3
  maxReplicas: 30
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
