apiVersion: v1
kind: LimitRange
metadata:
  name: hxy-default-limits
  namespace: hxy-prod-core
spec:
  limits:
    - type: Container
      defaultRequest:
        cpu: 200m
        memory: 256Mi
      default:
        cpu: "1"
        memory: 1024Mi
      min:
        cpu: 50m
        memory: 128Mi
      max:
        cpu: "4"
        memory: 4096Mi
---
apiVersion: v1
kind: LimitRange
metadata:
  name: hxy-default-limits
  namespace: hxy-prod-edge
spec:
  limits:
    - type: Container
      defaultRequest:
        cpu: 100m
        memory: 192Mi
      default:
        cpu: 600m
        memory: 768Mi
      min:
        cpu: 50m
        memory: 128Mi
      max:
        cpu: "2"
        memory: 2048Mi
