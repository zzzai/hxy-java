name: hxy-payment-stagea-p0-23

on:
  pull_request:
    branches: [ main, master ]
    paths:
      - "ruoyi-vue-pro-master/script/dev/run_payment_stagea_p0_23.sh"
      - "ruoyi-vue-pro-master/script/dev/check_hxy_naming_guard.sh"
      - "ruoyi-vue-pro-master/script/dev/check_hxy_memory_guard.sh"
      - "ruoyi-vue-pro-master/script/dev/setup_github_required_checks.sh"
      - "ruoyi-vue-pro-master/sql/mysql/ruoyi-modules-member-pay-mall.sql"
      - "ruoyi-vue-pro-master/sql/mysql/hxy/2026-03-02-hxy-product-template-version-binding.sql"
      - "ruoyi-vue-pro-master/yudao-module-mall/yudao-module-product/**"
      - "ruoyi-vue-pro-master/yudao-module-mall/yudao-module-trade/**"
      - "ruoyi-vue-pro-master/yudao-module-mall/yudao-module-booking/**"
      - "ruoyi-vue-pro-master/yudao-server/src/main/java/com/hxy/server/config/booking/**"
      - "ruoyi-vue-pro-master/yudao-server/src/test/java/com/hxy/server/config/booking/**"
      - ".github/workflows/payment-stagea-p0-23.yml"
  workflow_dispatch:
    inputs:
      require_naming_guard:
        description: "命名门禁失败是否阻断"
        required: true
        default: true
        type: boolean
      require_memory_guard:
        description: "记忆门禁失败是否阻断"
        required: true
        default: true
        type: boolean
      run_server_gateway_test:
        description: "是否执行 Server 预约网关单测"
        required: true
        default: true
        type: boolean

permissions:
  contents: read

jobs:
  stagea-p0-23:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run stageA p0-23 pipeline
        run: |
          artifact_base="${RUNNER_TEMP}/payment_stagea_p0_23"
          mkdir -p "${artifact_base}"

          require_naming_input="${{ github.event.inputs.require_naming_guard }}"
          require_memory_input="${{ github.event.inputs.require_memory_guard }}"
          run_server_gateway_input="${{ github.event.inputs.run_server_gateway_test }}"

          [[ -z "${require_naming_input}" ]] && require_naming_input="true"
          [[ -z "${require_memory_input}" ]] && require_memory_input="true"
          [[ -z "${run_server_gateway_input}" ]] && run_server_gateway_input="true"

          require_naming=0
          require_memory=0
          run_server_gateway=0
          [[ "${require_naming_input}" == "true" ]] && require_naming=1
          [[ "${require_memory_input}" == "true" ]] && require_memory=1
          [[ "${run_server_gateway_input}" == "true" ]] && run_server_gateway=1

          run_id="gha_${GITHUB_RUN_ID}_${GITHUB_RUN_ATTEMPT}_${GITHUB_JOB}"
          run_id="${run_id//[^a-zA-Z0-9._-]/_}"

          diff_range="${{ github.event.before }}...${{ github.sha }}"
          naming_diff_range="HEAD~1...HEAD"
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            diff_range="${{ github.event.pull_request.base.sha }}...${{ github.sha }}"
            naming_diff_range="${{ github.event.pull_request.head.sha }}~1...${{ github.event.pull_request.head.sha }}"
          elif [[ -z "${{ github.event.before }}" || "${{ github.event.before }}" == "0000000000000000000000000000000000000000" ]]; then
            diff_range="HEAD~1...HEAD"
          fi

          set +e
          RUN_ID="${run_id}" \
          ARTIFACT_BASE_DIR="${artifact_base}" \
          GIT_DIFF_RANGE="${diff_range}" \
          NAMING_GIT_DIFF_RANGE="${naming_diff_range}" \
          REQUIRE_NAMING_GUARD="${require_naming}" \
          REQUIRE_MEMORY_GUARD="${require_memory}" \
          RUN_SERVER_GATEWAY_TEST="${run_server_gateway}" \
          bash ruoyi-vue-pro-master/script/dev/run_payment_stagea_p0_23.sh
          rc=$?
          set -e

          out_dir="${artifact_base}/${run_id}"
          if [[ ! -d "${out_dir}" ]]; then
            latest_out_dir="$(ls -1dt "${artifact_base}"/* 2>/dev/null | head -n 1 || true)"
            if [[ -n "${latest_out_dir}" && -d "${latest_out_dir}" ]]; then
              out_dir="${latest_out_dir}"
            fi
          fi

          echo "PIPE_RC=${rc}" >> "$GITHUB_ENV"
          echo "PIPE_OUT_DIR=${out_dir}" >> "$GITHUB_ENV"

      - name: Publish step summary
        if: always()
        run: |
          summary_file="${PIPE_OUT_DIR}/summary.txt"
          kv() {
            local file="$1"
            local key="$2"
            local line
            line="$(grep -E "^${key}=" "${file}" | head -n 1 || true)"
            if [[ -z "${line}" ]]; then
              printf ''
            else
              printf '%s' "${line#*=}"
            fi
          }
          {
            echo "## Payment StageA P0-23"
            echo
            echo "| Key | Value |"
            echo "|---|---|"
            echo "| pipeline_exit_code | **$(kv "${summary_file}" pipeline_exit_code)** |"
            echo "| naming_guard_rc | $(kv "${summary_file}" naming_guard_rc) |"
            echo "| memory_guard_rc | $(kv "${summary_file}" memory_guard_rc) |"
            echo "| product_test_rc | $(kv "${summary_file}" product_test_rc) |"
            echo "| trade_test_rc | $(kv "${summary_file}" trade_test_rc) |"
            echo "| booking_test_rc | $(kv "${summary_file}" booking_test_rc) |"
            echo "| server_gateway_test_rc | $(kv "${summary_file}" server_gateway_test_rc) |"
            echo "| final_gate_log | \`$(kv "${summary_file}" final_gate_log)\` |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: payment-stagea-p0-23-${{ github.run_id }}
          path: ${{ env.PIPE_OUT_DIR }}
          if-no-files-found: error

      - name: Final gate
        if: always()
        run: |
          if [[ "${PIPE_RC}" != "0" ]]; then
            echo "stagea p0 23 failed: rc=${PIPE_RC}" >&2
            exit "${PIPE_RC}"
          fi
