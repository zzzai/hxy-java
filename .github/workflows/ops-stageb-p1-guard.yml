name: hxy-ops-stageb-p1-guard

on:
  pull_request:
    branches: [ main, master ]
    paths:
      - "ruoyi-vue-pro-master/script/dev/run_ops_stageb_p1_local_ci.sh"
      - "ruoyi-vue-pro-master/script/dev/check_booking_refund_notify_gate.sh"
      - "ruoyi-vue-pro-master/script/dev/check_booking_refund_audit_gate.sh"
      - "ruoyi-vue-pro-master/script/dev/check_booking_refund_replay_v2_gate.sh"
      - "ruoyi-vue-pro-master/script/dev/check_booking_refund_replay_runlog_gate.sh"
      - "ruoyi-vue-pro-master/script/dev/check_booking_refund_replay_run_summary_gate.sh"
      - "ruoyi-vue-pro-master/script/dev/check_store_sku_stock_gate.sh"
      - "ruoyi-vue-pro-master/script/dev/check_store_lifecycle_change_order_gate.sh"
      - "ruoyi-vue-pro-master/script/dev/setup_github_required_checks.sh"
      - "ruoyi-vue-pro-master/sql/mysql/ruoyi-modules-member-pay-mall.sql"
      - "ruoyi-vue-pro-master/sql/mysql/hxy/2026-02-28-hxy-store-product-mapping.sql"
      - "ruoyi-vue-pro-master/sql/mysql/hxy/2026-03-01-hxy-store-sku-stock-flow.sql"
      - "ruoyi-vue-pro-master/sql/mysql/hxy/2026-03-05-hxy-store-lifecycle-change-order.sql"
      - "ruoyi-vue-pro-master/sql/mysql/hxy/2026-03-05-hxy-store-lifecycle-change-order-sla.sql"
      - "ruoyi-vue-pro-master/sql/mysql/hxy/2026-03-05-hxy-store-sku-stock-adjust-order.sql"
      - "ruoyi-vue-pro-master/sql/mysql/hxy/2026-03-06-hxy-store-sku-transfer-order-and-stocktake-audit-config.sql"
      - "ruoyi-vue-pro-master/yudao-module-mall/yudao-module-product/**"
      - "ruoyi-vue-pro-master/yudao-module-mall/yudao-module-trade/**"
      - "ruoyi-vue-pro-master/yudao-module-mall/yudao-module-booking/**"
      - ".github/workflows/ops-stageb-p1-guard.yml"
  workflow_dispatch:
    inputs:
      require_naming_guard:
        description: "命名门禁失败是否阻断"
        required: true
        default: true
        type: boolean
      require_memory_guard:
        description: "记忆门禁失败是否阻断"
        required: true
        default: true
        type: boolean
      require_booking_refund_audit_gate:
        description: "退款审计汇总门禁失败是否阻断"
        required: true
        default: true
        type: boolean
      require_booking_refund_replay_v2_gate:
        description: "退款回调补偿V2门禁失败是否阻断"
        required: true
        default: true
        type: boolean
      require_booking_refund_replay_runlog_gate:
        description: "退款重放运行台账V3门禁失败是否阻断"
        required: true
        default: true
        type: boolean
      require_booking_refund_replay_run_summary_gate:
        description: "退款重放汇总与工单同步门禁失败是否阻断"
        required: true
        default: true
        type: boolean
      require_store_sku_stock_gate:
        description: "库存门禁失败是否阻断"
        required: true
        default: true
        type: boolean
      require_store_lifecycle_gate:
        description: "生命周期门禁失败是否阻断"
        required: true
        default: true
        type: boolean
      run_tests:
        description: "是否执行 product/trade/booking 回归测试"
        required: true
        default: true
        type: boolean
      clean_before_tests:
        description: "回归测试前是否执行 Maven clean"
        required: true
        default: false
        type: boolean
      pending_approval_timeout_minutes:
        description: "库存审批待审超时阈值（分钟）"
        required: true
        default: "120"
        type: string

permissions:
  contents: read

jobs:
  ops-stageb-p1-guard:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai
      DB_HOST: 127.0.0.1
      DB_PORT: "3306"
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: hxy_dev
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: hxy_dev
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Install MySQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y mysql-client

      - name: Wait MySQL ready
        run: |
          for i in {1..60}; do
            if mysql -h"${DB_HOST}" -P"${DB_PORT}" -u"${DB_USER}" -p"${DB_PASSWORD}" -e "SELECT 1;" "${DB_NAME}" >/dev/null 2>&1; then
              echo "MySQL is ready"
              exit 0
            fi
            sleep 2
          done
          echo "MySQL not ready in time" >&2
          exit 1

      - name: Run ops stageB p1 guard
        run: |
          artifact_base="${RUNNER_TEMP}/ops_stageb_p1_guard"
          mkdir -p "${artifact_base}"

          require_naming_input="${{ github.event.inputs.require_naming_guard }}"
          require_memory_input="${{ github.event.inputs.require_memory_guard }}"
          require_refund_audit_input="${{ github.event.inputs.require_booking_refund_audit_gate }}"
          require_refund_replay_v2_input="${{ github.event.inputs.require_booking_refund_replay_v2_gate }}"
          require_refund_replay_runlog_input="${{ github.event.inputs.require_booking_refund_replay_runlog_gate }}"
          require_refund_replay_run_summary_input="${{ github.event.inputs.require_booking_refund_replay_run_summary_gate }}"
          require_stock_input="${{ github.event.inputs.require_store_sku_stock_gate }}"
          require_lifecycle_input="${{ github.event.inputs.require_store_lifecycle_gate }}"
          run_tests_input="${{ github.event.inputs.run_tests }}"
          clean_before_tests_input="${{ github.event.inputs.clean_before_tests }}"
          pending_timeout_input="${{ github.event.inputs.pending_approval_timeout_minutes }}"

          [[ -z "${require_naming_input}" ]] && require_naming_input="true"
          [[ -z "${require_memory_input}" ]] && require_memory_input="true"
          [[ -z "${require_refund_audit_input}" ]] && require_refund_audit_input="true"
          [[ -z "${require_refund_replay_v2_input}" ]] && require_refund_replay_v2_input="true"
          [[ -z "${require_refund_replay_runlog_input}" ]] && require_refund_replay_runlog_input="true"
          [[ -z "${require_refund_replay_run_summary_input}" ]] && require_refund_replay_run_summary_input="true"
          [[ -z "${require_stock_input}" ]] && require_stock_input="true"
          [[ -z "${require_lifecycle_input}" ]] && require_lifecycle_input="true"
          [[ -z "${run_tests_input}" ]] && run_tests_input="true"
          [[ -z "${clean_before_tests_input}" ]] && clean_before_tests_input="false"
          [[ -z "${pending_timeout_input}" ]] && pending_timeout_input="120"

          require_naming=0
          require_memory=0
          require_refund_audit=0
          require_refund_replay_v2=0
          require_refund_replay_runlog=0
          require_refund_replay_run_summary=0
          require_stock=0
          require_lifecycle=0
          run_tests=0
          clean_before_tests=0
          [[ "${require_naming_input}" == "true" ]] && require_naming=1
          [[ "${require_memory_input}" == "true" ]] && require_memory=1
          [[ "${require_refund_audit_input}" == "true" ]] && require_refund_audit=1
          [[ "${require_refund_replay_v2_input}" == "true" ]] && require_refund_replay_v2=1
          [[ "${require_refund_replay_runlog_input}" == "true" ]] && require_refund_replay_runlog=1
          [[ "${require_refund_replay_run_summary_input}" == "true" ]] && require_refund_replay_run_summary=1
          [[ "${require_stock_input}" == "true" ]] && require_stock=1
          [[ "${require_lifecycle_input}" == "true" ]] && require_lifecycle=1
          [[ "${run_tests_input}" == "true" ]] && run_tests=1
          [[ "${clean_before_tests_input}" == "true" ]] && clean_before_tests=1

          run_id="gha_${GITHUB_RUN_ID}_${GITHUB_RUN_ATTEMPT}_${GITHUB_JOB}"
          run_id="${run_id//[^a-zA-Z0-9._-]/_}"

          diff_range="${{ github.event.before }}...${{ github.sha }}"
          naming_diff_range="HEAD~1...HEAD"
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            diff_range="${{ github.event.pull_request.base.sha }}...${{ github.sha }}"
            naming_diff_range="${{ github.event.pull_request.head.sha }}~1...${{ github.event.pull_request.head.sha }}"
          elif [[ -z "${{ github.event.before }}" || "${{ github.event.before }}" == "0000000000000000000000000000000000000000" ]]; then
            diff_range="HEAD~1...HEAD"
          fi

          test_flag="--skip-tests"
          if [[ "${run_tests}" == "1" ]]; then
            test_flag=""
          fi

          clean_before_tests_flag=""
          if [[ "${clean_before_tests}" == "1" ]]; then
            clean_before_tests_flag="--clean-before-tests"
          fi

          regression_test_classes="ProductStoreSkuControllerTest,ProductStoreServiceImplTest,AfterSaleReviewTicketServiceImplTest,BookingOrderServiceImplTest,AppBookingOrderControllerTest,FourAccountReconcileServiceImplTest,FourAccountReconcileControllerTest"

          set +e
          RUN_ID="${run_id}" \
          ARTIFACT_BASE_DIR="${artifact_base}" \
          DB_HOST="${DB_HOST}" \
          DB_PORT="${DB_PORT}" \
          DB_USER="${DB_USER}" \
          DB_PASSWORD="${DB_PASSWORD}" \
          DB_NAME="${DB_NAME}" \
          GIT_DIFF_RANGE="${diff_range}" \
          NAMING_GIT_DIFF_RANGE="${naming_diff_range}" \
          REQUIRE_NAMING_GUARD="${require_naming}" \
          REQUIRE_MEMORY_GUARD="${require_memory}" \
          REQUIRE_BOOKING_REFUND_AUDIT_GATE="${require_refund_audit}" \
          REQUIRE_BOOKING_REFUND_REPLAY_V2_GATE="${require_refund_replay_v2}" \
          REQUIRE_BOOKING_REFUND_REPLAY_RUNLOG_GATE="${require_refund_replay_runlog}" \
          REQUIRE_BOOKING_REFUND_REPLAY_RUN_SUMMARY_GATE="${require_refund_replay_run_summary}" \
          REQUIRE_STORE_SKU_STOCK_GATE="${require_stock}" \
          REQUIRE_STORE_LIFECYCLE_GATE="${require_lifecycle}" \
          REGRESSION_TEST_CLASSES="${regression_test_classes}" \
          bash ruoyi-vue-pro-master/script/dev/run_ops_stageb_p1_local_ci.sh \
            --pending-approval-timeout-minutes "${pending_timeout_input}" \
            ${clean_before_tests_flag} \
            ${test_flag}
          rc=$?
          set -e

          out_dir="${artifact_base}/${run_id}"
          if [[ ! -d "${out_dir}" ]]; then
            latest_out_dir="$(ls -1dt "${artifact_base}"/* 2>/dev/null | head -n 1 || true)"
            if [[ -n "${latest_out_dir}" && -d "${latest_out_dir}" ]]; then
              out_dir="${latest_out_dir}"
            fi
          fi

          echo "PIPE_RC=${rc}" >> "$GITHUB_ENV"
          echo "PIPE_OUT_DIR=${out_dir}" >> "$GITHUB_ENV"

      - name: Publish step summary
        if: always()
        run: |
          summary_file="${PIPE_OUT_DIR}/summary.txt"
          kv() {
            local file="$1"
            local key="$2"
            local line
            line="$(grep -E "^${key}=" "${file}" | head -n 1 || true)"
            if [[ -z "${line}" ]]; then
              printf ''
            else
              printf '%s' "${line#*=}"
            fi
          }
          {
            echo "## Ops StageB P1 Guard"
            echo
            echo "| Key | Value |"
            echo "|---|---|"
            echo "| pipeline_exit_code | **$(kv "${summary_file}" pipeline_exit_code)** |"
            echo "| naming_guard_rc | $(kv "${summary_file}" naming_guard_rc) |"
            echo "| memory_guard_rc | $(kv "${summary_file}" memory_guard_rc) |"
            echo "| booking_refund_notify_gate_rc | $(kv "${summary_file}" booking_refund_notify_gate_rc) |"
            echo "| booking_refund_audit_gate_rc | $(kv "${summary_file}" booking_refund_audit_gate_rc) |"
            echo "| booking_refund_replay_v2_gate_rc | $(kv "${summary_file}" booking_refund_replay_v2_gate_rc) |"
            echo "| booking_refund_replay_runlog_gate_rc | $(kv "${summary_file}" booking_refund_replay_runlog_gate_rc) |"
            echo "| booking_refund_replay_run_summary_gate_rc | $(kv "${summary_file}" booking_refund_replay_run_summary_gate_rc) |"
            echo "| run_booking_refund_replay_run_summary_gate | $(kv "${summary_file}" run_booking_refund_replay_run_summary_gate) |"
            echo "| require_booking_refund_replay_run_summary_gate | $(kv "${summary_file}" require_booking_refund_replay_run_summary_gate) |"
            echo "| store_sku_stock_gate_rc | $(kv "${summary_file}" store_sku_stock_gate_rc) |"
            echo "| store_lifecycle_change_order_gate_rc | $(kv "${summary_file}" store_lifecycle_change_order_gate_rc) |"
            echo "| tests_rc | $(kv "${summary_file}" tests_rc) |"
            echo "| clean_before_tests | $(kv "${summary_file}" clean_before_tests) |"
            echo "| result_tsv | \`$(kv "${summary_file}" result_tsv)\` |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload summary artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ops-stageb-p1-summary-${{ github.run_id }}
          path: ${{ env.PIPE_OUT_DIR }}/summary.txt
          if-no-files-found: error

      - name: Upload tsv artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ops-stageb-p1-tsv-${{ github.run_id }}
          path: ${{ env.PIPE_OUT_DIR }}/result.tsv
          if-no-files-found: error

      - name: Final gate
        if: always()
        run: |
          if [[ "${PIPE_RC}" != "0" ]]; then
            echo "ops stageb p1 guard failed: rc=${PIPE_RC}" >&2
            exit "${PIPE_RC}"
          fi
